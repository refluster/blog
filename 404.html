<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI NATIVE ARTICLE</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When a user navigates directly to a client-side route (e.g. /article/abc123),
    // GitHub Pages returns this 404.html. We store the intended path in sessionStorage
    // and redirect to the root. The root index.html then reads it back and replaces
    // the history entry so React Router sees the correct path.
    var base = '/ai-native-article/';
    sessionStorage.setItem('spa_redirect', location.href);
    location.replace(base);
  </script>
</head>
<body></body>
</html>
